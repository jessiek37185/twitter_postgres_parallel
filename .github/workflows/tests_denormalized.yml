name: tests_denormalized_sequential
on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: setup python
      run: |
        pip3 install -r requirements.txt
    - name: docker
      run: |
        git submodule init
        git submodule update
        docker compose up -d --build
        docker ps -a
        until docker compose exec -T pg_normalized_batch pg_isready -U postgres; do sleep 1; done
        until docker compose exec -T pg_normalized pg_isready -U postgres; do sleep 1; done
        until docker compose exec -T pg_denormalized pg_isready -U postgres; do sleep 1; done
		./load_tweets_sequential.sh
		docker compose exec -T pg_denormalized ./run_tests.sh
